<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Talponia Chat</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <h1>Talponia Chat</h1>
    <div id="clickable-area">
        <p class="show">click to add a message</p>
        <form id="form">
            <div id="btn-close-container">
                <button id="btn-close" type="button">x</button>
            </div>
            <div class="form-item">
            <label for="name">Name</label>
            <input type="text" id="name" name="name"> 
            <p class="validation-message" id="name-alert">please enter name</p>
            </div>
            <div class="form-item">
            <label for="age">When was the egg you were born in laid?</label>
            <input type="date" id="age" name="age">
            <p class="validation-message" id="age-alert">please enter date</p>
            </div>
            <div class="form-item">
            <label for="Message">Message</label>
            <textarea id="message" name="message"></textarea>
            <p class="validation-message" id="message-alert">please enter a message</p>
            </div>
            <div id="submit-container">
            <button id="btn" type="button">submit</button>
            </div>
        </form>
        <div id="test-test" class="show">
            
        </div>
    </div>
    <script src="script.js"></script> 
</body>
</html>
