<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Talponia Chat</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <h1>Talponia Chat</h1>
    <div id="clickable-area">
        <p class="show">click to add a message</p>
        <form id="form">
            <div id="btn-close-container">
                <button id="btn-close" type="button">x</button>
            </div>
            <div class="form-item">
            <label for="name">Name</label>
            <input type="text" id="name" name="name"> 
            </div>
            <div class="form-item">
            <label for="lat">Lattitude</label>
            <input type="text" id="lat" name="lat">
            </div> 
            <div class="form-item">
            <label for="long">Longitude</label>
            <input type="text" id="long" name="long">
            </div>
            <div class="form-item">
            <label for="age">When was the egg you were born in layed?</label>
            <input type="date" id="age" name="age">
            </div>
            <div class="form-item">
            <label for="Message">message</label>
            <input type="text" id="message" name="message">
            </div>
            <div id="submit-container">
            <button id="btn" type="button">submit</button>
            </div>
        </form>
    </div>
    <script src="script.js"></script> 
</body>
</html>
